apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alerting-provisioning
  namespace: observability
  labels:
    grafana_alert: "1"
data:
  contactpoints.yaml: |
    apiVersion: 1
    contactPoints:
      - orgId: 1
        name: discord-channel
        receivers:
          - uid: discord-receiver
            type: discord
            disableResolveMessage: false
            settings:
              url: https://discord.com/api/webhooks/1499942128460107856/Ev-kyQjDXkWqSK1kvQz_5WmTS5xsi1kUzkxY5b0PaHBxWOcXAHGVtBPLwbTEhxZxwkXq
              title: |
                {{ if eq .Status "firing" }}ALERTA DISPARADO{{ else }}ALERTA RESOLVIDO{{ end }} - {{ .CommonLabels.alertname }}
              message: |
                **Status:** {{ .Status }}
                **Servico:** {{ .CommonLabels.service }}
                **Severidade:** {{ .CommonLabels.severity }}
                {{ range .Alerts }}
                **Resumo:** {{ .Annotations.summary }}
                **Descricao:** {{ .Annotations.description }}
                {{ end }}
              avatar_url: https://grafana.com/static/img/menu/grafana2.svg
              use_discord_username: false

      - orgId: 1
        name: pagerduty-incidents
        receivers:
          - uid: pagerduty-receiver
            type: pagerduty
            disableResolveMessage: false
            settings:
              integrationKey: 2816c9c1b4af470dd002b15c3398b989
              severity: critical
              class: togglemaster
              component: '{{ .CommonLabels.service }}'
              group: '{{ .CommonLabels.severity }}'
              summary: '{{ .CommonLabels.alertname }} - {{ .CommonLabels.service }}'

      - orgId: 1
        name: github-self-healing
        receivers:
          - uid: github-receiver
            type: webhook
            disableResolveMessage: true
            settings:
              url: https://api.github.com/repos/$GITHUB_REPO_FULL_NAME/dispatches
              httpMethod: POST
              authorization_scheme: Bearer
              authorization_credentials: $GITHUB_DISPATCH_TOKEN
              maxAlerts: 1
              hmacConfig: { enabled: false }
              payload:
                  template: |
                    {
                      "event_type": "rollout-restart",
                      "client_payload": {
                        "service": "{{ if .Alerts }}{{ (index .Alerts 0).Labels.service }}{{ end }}",
                        "alertname": "{{ if .Alerts }}{{ (index .Alerts 0).Labels.alertname }}{{ end }}",
                        "fired_at": "{{ if .Alerts }}{{ (index .Alerts 0).StartsAt }}{{ end }}"
                      }
                    }
                  vars: {}

  policies.yaml: |
    apiVersion: 1
    policies:
      - orgId: 1
        receiver: discord-channel
        group_by: ["alertname", "service"]
        group_wait: 10s
        group_interval: 1m
        repeat_interval: 30m
        routes:
          - receiver: pagerduty-incidents
            object_matchers:
              - ["severity", "=", "critical"]
            group_wait: 10s
            group_interval: 1m
            repeat_interval: 30m
            continue: true
          - receiver: github-self-healing
            object_matchers:
              - ["action", "=", "rollout-restart"]
            group_wait: 10s
            group_interval: 5m
            repeat_interval: 1h
            continue: true

  rules.yaml: |
    apiVersion: 1
    groups:
      - orgId: 1
        name: togglemaster-critical
        folder: ToggleMaster
        interval: 30s
        rules:
          - uid: auth-service-high-5xx
            title: AuthServiceHigh5xx
            condition: B
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  editorMode: code
                  expr: 'sum(rate(http_server_duration_milliseconds_count{service_name="auth-service",http_status_code=~"5.."}[2m])) / clamp_min(sum(rate(http_server_duration_milliseconds_count{service_name="auth-service"}[2m])), 0.01)'
                  instant: true
                  range: false
                  intervalMs: 1000
                  maxDataPoints: 43200
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: __expr__
                model:
                  conditions:
                    - evaluator:
                        params: [0.05]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: A
                  intervalMs: 1000
                  maxDataPoints: 43200
                  refId: B
                  type: threshold
            noDataState: NoData
            execErrState: Error
            for: 1m
            isPaused: false
            annotations:
              summary: "Taxa de erro 5xx do auth-service excede 5%"
              description: "O auth-service esta retornando mais de 5% de erros HTTP 5xx nos ultimos 2 minutos. Self-healing sera acionado automaticamente."
              runbook_url: "https://github.com/lugentil/fiap-etapa-4"
            labels:
              severity: critical
              service: auth-service
              action: rollout-restart
              team: togglemaster
          - uid: pod-crashloop
            title: PodCrashLoopBackoff
            condition: B
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  editorMode: code
                  expr: 'sum by (namespace, pod) (kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff",namespace=~"auth-service|flag-service|targeting-service|evaluation-service|analytics-service"})'
                  instant: true
                  range: false
                  intervalMs: 1000
                  maxDataPoints: 43200
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: __expr__
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: A
                  intervalMs: 1000
                  maxDataPoints: 43200
                  refId: B
                  type: threshold
            noDataState: OK
            execErrState: Error
            for: 2m
            isPaused: false
            annotations:
              summary: "Pod em CrashLoopBackOff"
              description: "Pelo menos um pod de microsservico esta em CrashLoopBackOff ha mais de 2 minutos."
            labels:
              severity: critical
              team: togglemaster