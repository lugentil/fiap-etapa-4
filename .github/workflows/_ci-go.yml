name: CI - Go Service (Reusable)

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_path:
        required: true
        type: string
      ecr_repository:
        required: true
        type: string
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_SESSION_TOKEN:
        required: true

env:
  AWS_REGION: us-east-1

jobs:
  build-and-test:
    name: Build & Unit Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.service_path }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: go test ./... -v -coverprofile=coverage.out

  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.service_path }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: ${{ inputs.service_path }}
          args: --timeout=5m

  security-scan:
    name: Security Scan (SCA + SAST)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.service_path }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      # SCA - Software Composition Analysis (Trivy)
      - name: Trivy FS Scan (SCA)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: ${{ inputs.service_path }}
          severity: "CRITICAL"
          exit-code: "1"

      # SAST - Static Application Security Testing (gosec)
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec (SAST)
        run: gosec -exclude=G706 ./...

  docker-build-push:
    name: Docker Build & Push to ECR
    runs-on: ubuntu-latest
    needs: [build-and-test, lint, security-scan]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and tag Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ inputs.ecr_repository }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                        -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
                        ${{ inputs.service_path }}

      - name: Trivy Container Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ steps.login-ecr.outputs.registry }}/${{ inputs.ecr_repository }}:${{ github.sha }}"
          severity: "CRITICAL"
          exit-code: "1"

      - name: Push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ inputs.ecr_repository }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Update GitOps manifest
        env:
          IMAGE_TAG: ${{ github.sha }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ inputs.ecr_repository }}
        run: |
          MANIFEST="gitops/apps/${{ inputs.service_name }}/deployment.yaml"
          NEW_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

          if [ ! -f "${MANIFEST}" ]; then
            echo "Manifesto nao encontrado: ${MANIFEST}"
            exit 1
          fi

          sed -i "s|image:.*${ECR_REPOSITORY}.*|image: ${NEW_IMAGE}|" "${MANIFEST}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${MANIFEST}"

          if git diff --cached --quiet; then
            echo "Nenhuma alteracao de imagem detectada no manifesto."
            exit 0
          fi

          git commit -m "chore(${{ inputs.service_name }}): atualiza imagem para ${IMAGE_TAG:0:8}"

          MAX_RETRIES=5
          for i in $(seq 1 $MAX_RETRIES); do
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              echo "Manifesto GitOps atualizado com sucesso."
              exit 0
            fi

            echo "Push falhou (tentativa $i/$MAX_RETRIES), executando rebase..."
            git pull --rebase origin "${GITHUB_REF_NAME}"
          done

          echo "Falha ao enviar alteracoes no GitOps apos ${MAX_RETRIES} tentativas."
          exit 1
